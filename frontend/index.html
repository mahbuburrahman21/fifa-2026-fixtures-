<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 — Fixtures in Bangladesh Time</title>
  <meta name="description" content="FIFA World Cup 2026 match chart with kickoff times in Bangladesh Standard Time (UTC+6), real-time live scores, lineups, player ratings and match stats." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Pinned versions so every browser gets identical, known-good builds -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
</head>
<body>
  <div id="root">
    <div class="boot-splash">
      <div class="boot-ball">⚽</div>
      <p>Loading World Cup 2026 fixtures…</p>
    </div>
  </div>

  <!--
    Compile app.jsx ourselves with the CLASSIC React runtime so JSX becomes
    React.createElement (no `import` statements that break a plain <script>).
    Also surfaces a visible message instead of a silent blank page on failure.
  -->
  <script>
    (function () {
      function fail(msg) {
        var r = document.getElementById("root");
        if (r) r.innerHTML =
          '<div class="boot-splash"><div class="boot-ball">⚠️</div><p>' + msg + '</p></div>';
        console.error("[WC2026]", msg);
      }
      if (!window.React || !window.ReactDOM || !window.Babel) {
        return fail("Could not load app libraries (React/Babel). Check your connection or ad-blocker, then reload.");
      }
      fetch("app.jsx")
        .then(function (r) {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.text();
        })
        .then(function (code) {
          var out = Babel.transform(code, {
            presets: [["react", { runtime: "classic" }], ["env", { modules: false }]],
          }).code;
          var s = document.createElement("script");
          s.text = out;
          document.body.appendChild(s);
        })
        .catch(function (e) { fail("Failed to start the app: " + e.message); });
    })();
  </script>
</body>
</html>
